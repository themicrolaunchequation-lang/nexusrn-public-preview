n:"Name five things you see",expansion:1.02},{label:"4 Touched",seconds:5,instruction:"Notice four points of contact",expansion:.98},{label:"3 Heard",seconds:5,instruction:"Name three sounds",expansion:1.02},{label:"2 Smelled",seconds:4,instruction:"Notice two scents or neutral air",expansion:.98},{label:"1 Tasted",seconds:4,instruction:"Notice one taste or mouth sensation",expansion:1}]}],xy=[{id:"panic-first",category:"Panic Pattern",prompt:"What usually happens first when anxiety spikes?",options:[{label:"racing thoughts",riskFlag:"Panic Spiral Flag"},{label:"fast breathing",riskFlag:"Panic Spiral Flag"},{label:"freezing",riskFlag:"Confidence Collapse Flag"},{label:"changing answers repeatedly",riskFlag:"Overconfidence Flag"},{label:"mental blanking",riskFlag:"Catastrophic Thinking Flag"}]},{id:"panic-trigger",category:"Panic Pattern",prompt:"What most often triggers panic?",options:[{label:"low scores",riskFlag:"Catastrophic Thinking Flag"},{label:"difficult NGN cases",riskFlag:"NGN Avoidance After Misses"},{label:"time pressure",riskFlag:"Panic Spiral Flag"},{label:"long stems",riskFlag:"Cognitive Exhaustion Flag"},{label:"uncertainty",riskFlag:"Confidence Collapse Flag"}]},{id:"fatigue-effect",category:"Fatigue Pattern",prompt:"How does fatigue usually affect your performance?",options:[{label:"rushing",riskFlag:"Cognitive Exhaustion Flag"},{label:"keyword misses",riskFlag:"Cognitive Exhaustion Flag"},{label:"poor prioritization",riskFlag:"Cognitive Exhaustion Flag"},{label:"random guessing",riskFlag:"Confidence Collapse Flag"},{label:"loss of confidence",riskFlag:"Confidence Collapse Flag"}]},{id:"after-difficult",category:"Missed-Streak Reaction",prompt:"After a difficult session, what usually happens next?",options:[{label:"I stop studying",riskFlag:"Confidence Collapse Flag"},{label:"I panic-review",riskFlag:"Catastrophic Thinking Flag"},{label:"I avoid NGN",riskFlag:"NGN Avoidance After Misses"},{label:"I recover quickly"},{label:"I over-study aggressively",riskFlag:"Cognitive Exhaustion Flag"}]},{id:"exam-activation",category:"Exam-Day Activation",prompt:"On timed sets, which sign tells you activation is too high?",options:[{label:"reading without absorbing",riskFlag:"Panic Spiral Flag"},{label:"checking the clock every item",riskFlag:"Panic Spiral Flag"},{label:"needing perfect certainty",riskFlag:"Catastrophic Thinking Flag"},{label:"skipping long stems",riskFlag:"NGN Avoidance After Misses"},{label:"I use a reset and continue"}]}],S2=["Airway/Breathing","Circulation/Shock","Safety/Psych","Infection/Isolation","Medication","Maternity/Peds","Delegation","NGN Reasoning","Labs/Trends"],A2=(n,a,o)=>[{id:`${n}-scan-1`,prompt:`How often does ${a} show up in your reviews as ${o}?`,oftenSignal:"High risk: this pattern is probably costing priority points under pressure.",sometimesSignal:"Moderate risk: slow down when this cue cluster appears.",rarelySignal:"Lower risk: keep using deliberate cue clustering."},{id:`${n}-scan-2`,prompt:"When the stem feels familiar, how often do you answer before comparing the unstable cue against the expected cue?",oftenSignal:"High risk: familiarity is replacing clinical judgment.",sometimesSignal:"Moderate risk: force a 10-second safety check before choosing.",rarelySignal:"Lower risk: your pause habit is protecting you."},{id:`${n}-scan-3`,prompt:"After reading rationales, how often do you realize the question was testing this exact pattern rather than raw knowledge?",oftenSignal:"High risk: train the pattern, not just the topic.",sometimesSignal:"Moderate risk: label the trap in your error log.",rarelySignal:"Lower risk: continue linking rationales to decision rules."}],T2=[{id:"abc-tunnel-vision",name:"ABC Tunnel Vision",subtitle:"Airway language hides the more unstable patient.",category:["Airway/Breathing","Circulation/Shock","NGN Reasoning"],dangerLevel:"Danger",scanCue:"choosing the airway-sounding option while missing shock, perfusion, or a rapid trend",whyLearnersFallForIt:"ABC is memorable, so any cough, oxygen value, or wheeze can feel automatically first even when the airway is protected and another patient is crashing.",clinicalDanger:"A stable respiratory label can distract from hemorrhage, sepsis, dysrhythmia, or a neurologic decline that needs immediate action.",howToBeatIt:"Ask whether the airway is actually failing now, then compare instability, trend, and nurse-owned action before choosing.",redFlagCues:["speaks in full sentences","new hypotension","rapid heart rate","decreasing level of consciousness","worsening perfusion"],trappedThinker:["ABC says breathing comes first.","The oxygen number is abnormal, so that must be priority."],strongThinker:["Is the airway threatened right now?","Which cue cluster predicts fastest deterioration?"],nextTimeCoaching:"Use ABC as a safety lens, not a keyword shortcut; airway must be unstable before it outranks shock.",miniCases:[{title:"COPD Number Versus GI Bleed",clinicalTask:"Prioritize four assigned clients.",stem:"One client with COPD has SpO2 89% on 2 L and is speaking comfortably. Another has melena, HR 128, BP 86/50, and cool skin.",priorityQuestion:"Which client should the nurse see first?",choices:["COPD client with chronic low saturation","GI bleed client with hypotension and tachycardia","Client requesting a bronchodilator refill","Client with mild incisional pain"],correctAnswer:"GI bleed client with hypotension and tachycardia",trapAutopsy:"The oxygen value is tempting, but the COPD client is compensating. The bleed client has shock cues.",saferReasoningMove:"Confirm whether airway is failing, then prioritize perfusion collapse."},{title:"Wheeze Beside a Silent Chest Pain",clinicalTask:"Choose the immediate assessment focus.",stem:"A client with asthma has mild expiratory wheezes after walking. A post-op client reports new chest pressure, diaphoresis, and nausea.",priorityQuestion:"Which finding needs immediate follow-up?",choices:["Mild wheezing after activity","New chest pressure with diaphoresis","Dry cough after incentive spirometry","Sore throat after intubation"],correctAnswer:"New chest pressure with diaphoresis",trapAutopsy:"The wheeze sounds like ABC, but the myocardial ischemia cluster is more unstable.",saferReasoningMove:"Cluster autonomic, perfusion, and pain cues before reacting to airway words."},{title:"Pneumonia Label, Septic Pattern",clinicalTask:"Identify the urgent nursing action.",stem:"A pneumonia client has RR 24 and productive cough. Over two hours BP drops from 122/76 to 92/54 and urine output is 15 mL/hr.",priorityQuestion:"What should the nurse do first?",choices:["Teach coughing technique","Recheck lung sounds in four hours","Start sepsis protocol per policy","Offer warm fluids"],correctAnswer:"Start sepsis protocol per policy",trapAutopsy:"The respiratory diagnosis is not the priority clue; the perfusion trend is.",saferReasoningMove:"Treat worsening circulation as the current threat even when the admitting diagnosis is pulmonary."},{title:"Post-Op Snore Versus Hemorrhage",clinicalTask:"Select the priority bedside response.",stem:"A sedated client snores but awakens to voice and has SpO2 94%. Another post-op client has a saturated dressing and new restlessness.",priorityQuestion:"Which action is safest first?",choices:["Reposition the snoring client and continue monitoring","Assess the saturated dressing and vital signs immediately","Document expected sleepiness","Ask the restless client to rate pain"],correctAnswer:"Assess the saturated dressing and vital signs immediately",trapAutopsy:"Snoring can be airway-related, but the first client is arousable. Restlessness plus bleeding may signal shock.",saferReasoningMove:"Separate protected airway from threatened circulation."},{title:"Oxygen Mask Distraction",clinicalTask:"Prioritize escalation.",stem:"A client on a nonrebreather after smoke exposure is alert with SpO2 98%. A client receiving IV potassium reports palpitations and has peaked T waves.",priorityQuestion:"Which concern should be escalated first?",choices:["Smoke exposure client because oxygen equipment looks serious","Potassium client with ECG changes","Client waiting for a chest x-ray","Client asking for discharge teaching"],correctAnswer:"Potassium client with ECG changes",trapAutopsy:"Equipment intensity can mislead. ECG changes from potassium can become lethal immediately.",saferReasoningMove:"Prioritize physiologic instability over how dramatic the setup looks."}]},{id:"maslow-misuse",name:"Maslow Misuse",subtitle:"Basic needs do not outrank immediate safety every time.",category:["Safety/Psych","Circulation/Shock","NGN Reasoning"],dangerLevel:"Danger",scanCue:"choosing food, comfort, or belonging while a safety threat is active",whyLearnersFallForIt:"Maslow is taught early and feels simple, but NCLEX priority items require context, instability, and safety risk.",clinicalDanger:"Comfort or nutrition choices can delay suicide precautions, hypoglycemia treatment, fall prevention, or hemorrhage control.",howToBeatIt:"Use Maslow only after asking whether immediate physiologic collapse or safety harm is present.",redFlagCues:["suicidal plan","glucose under 70 with symptoms","fall attempts","active bleeding","violent agitation"],trappedThinker:["Food and oxygen are always first because they are basic needs.","Pain must be addressed before psychosocial issues."],strongThinker:["Safety can be the most basic need right now.","Which unmet need can harm the client fastest?"],nextTimeCoaching:"Maslow is a hierarchy, not a bypass around immediate safety.",miniCases:[{title:"Hungry But Hypoglycemic",clinicalTask:"Choose the first intervention.",stem:"A client with diabetes says, 'I missed breakfast and feel shaky.' Glucose is 48 mg/dL and the client is awake but diaphoretic.",priorityQuestion:"What should the nurse do first?",choices:["Order a full meal tray","Give 15 g rapid-acting carbohydrate","Teach meal planning","Ask about usual breakfast foods"],correctAnswer:"Give 15 g rapid-acting carbohydrate",trapAutopsy:"Nutrition matters, but symptomatic hypoglycemia requires immediate correction, not routine meal planning.",saferReasoningMove:"Treat the time-sensitive physiologic threat before broader teaching or comfort."},{title:"Warm Blanket Versus Suicide Plan",clinicalTask:"Prioritize environmental safety.",stem:"A depressed client requests a blanket and then states, 'When my spouse leaves, I know exactly how I will end this.'",priorityQuestion:"What is the priority action?",choices:["Provide a warm blanket","Initiate suicide precautions and stay with the client","Offer a meal","Schedule group therapy"],correctAnswer:"Initiate suicide precautions and stay with the client",trapAutopsy:"Comfort is not wrong, but a specific suicide plan creates an immediate safety priority.",saferReasoningMove:"When self-harm risk appears, safety outranks comfort requests."},{title:"Pain After a Fall Risk Cue",clinicalTask:"Select the safest first response.",stem:"An older adult rates hip pain 6/10 and repeatedly tries to climb over the side rails after a sedating medication.",priorityQuestion:"Which nursing action comes first?",choices:["Obtain the prescribed analgesic","Stay with the client and implement fall precautions","Explain the pain scale","Ask family to bring slippers later"],correctAnswer:"Stay with the client and implement fall precautions",trapAutopsy:"Pain control is important, but another fall could cause immediate injury.",saferReasoningMove:"Stabilize safety, then treat pain promptly."},{title:"Postpartum Meal Tray",clinicalTask:"Recognize the immediate threat.",stem:"A postpartum client says she is hungry. The pad is saturated in 15 minutes and the uterus is boggy above the umbilicus.",priorityQuestion:"What should the nurse do first?",choices:["Bring food before assessment","Massage the fundus and call for help","Teach breastfeeding nutrition","Document expected lochia"],correctAnswer:"Massage the fundus and call for help",trapAutopsy:"Hunger is real, but hemorrhage cues are time-critical.",saferReasoningMove:"Address active bleeding before lower-risk needs."},{title:"Belonging During Violence Risk",clinicalTask:"Choose a psych safety response.",stem:"A manic client wants to join peers in the dining room while pacing, clenching fists, and saying people are plotting against him.",priorityQuestion:"Which response is safest?",choices:["Encourage group participation","Move the client to a low-stimulation area with staff support","Discuss long-term coping skills","Offer the client a complex menu"],correctAnswer:"Move the client to a low-stimulation area with staff support",trapAutopsy:"Belonging is therapeutic only when the milieu is safe.",saferReasoningMove:"Reduce immediate violence risk before social or educational goals."}]},{id:"assessment-forever",name:"Assessment Forever",subtitle:"Collecting more data when the data already demands action.",category:["NGN Reasoning","Circulation/Shock","Safety/Psych"],dangerLevel:"Critical",scanCue:"choosing another assessment while decisive rescue action is already indicated",whyLearnersFallForIt:"Learners hear 'assess first' and apply it even after the stem gives enough cues to act safely.",clinicalDanger:"Delayed rescue can worsen hypoxia, stroke time, hypoglycemia, sepsis, or hemorrhage.",howToBeatIt:"Ask whether the assessment threshold has already been crossed. If yes, act with the safest nurse-owned intervention.",redFlagCues:["known critical value","symptoms plus abnormal vital signs","new focal deficit","uncontrolled bleeding","airway obstruction"],trappedThinker:["I need more information before doing anything.","Assessment is always the safest answer."],strongThinker:["The stem already proves danger.","Which action prevents deterioration while further data is gathered?"],nextTimeCoaching:"Assess until you have enough data, then rescue; do not use assessment to avoid action.",miniCases:[{title:"Pulmonary Edema Delay",clinicalTask:"Select the first action.",stem:"A client with heart failure is sitting upright, coughing pink frothy sputum, RR 34, and SpO2 82% on room air.",priorityQuestion:"What should the nurse do first?",choices:["Auscultate all lung fields for five minutes","Apply oxygen and call rapid response per policy","Ask about daily weights","Review the sodium intake log"],correctAnswer:"Apply oxygen and call rapid response per policy",trapAutopsy:"More lung assessment delays rescue when severe hypoxemia is already clear.",saferReasoningMove:"Act on life-threatening hypoxia, then reassess response."},{title:"Stroke Clock",clinicalTask:"Recognize time-sensitive escalation.",stem:"A client suddenly has right facial droop, slurred speech, and right arm drift. Symptoms began 20 minutes ago.",priorityQuestion:"Which action is priority?",choices:["Ask the family for a full history first","Activate the stroke response process","Give oral fluids","Wait to see if symptoms resolve"],correctAnswer:"Activate the stroke response process",trapAutopsy:"The neurologic assessment already identifies a stroke alert pattern.",saferReasoningMove:"Escalate time-sensitive focal deficits immediately."},{title:"Known Low Glucose",clinicalTask:"Choose immediate treatment.",stem:"A confused client has a capillary glucose of 39 mg/dL and is unable to swallow safely.",priorityQuestion:"What is the safest first action?",choices:["Repeat the fingerstick on another hand","Give IV dextrose per protocol","Ask what the client ate","Document altered mental status"],correctAnswer:"Give IV dextrose per protocol",trapAutopsy:"Repeating a clear critical value can delay treatment in an unsafe-to-swallow client.",saferReasoningMove:"Treat verified critical hypoglycemia using the safe route."},{title:"Sepsis Workup Stall",clinicalTask:"Prioritize protocol steps.",stem:"A client has temp 38.7 C, HR 122, BP 88/48, lactate 4.1, and new confusion.",priorityQuestion:"Which action is most urgent?",choices:["Complete a full head-to-toe assessment first","Initiate sepsis bundle actions per policy","Discuss discharge barriers","Wait for the next temperature"],correctAnswer:"Initiate sepsis bundle actions per policy",trapAutopsy:"The sepsis pattern is already present; broad assessment should not delay bundle care.",saferReasoningMove:"Use protocols to move from recognition to treatment quickly."},{title:"Airway Obstruction Evidence",clinicalTask:"Identify rescue action.",stem:"A client eating lunch suddenly cannot speak, cough, or breathe and grasps the throat.",priorityQuestion:"What should the nurse do?",choices:["Ask the client to rate shortness of breath","Perform abdominal thrusts if trained and indicated","Get a pulse oximeter reading first","Offer sips of water"],correctAnswer:"Perform abdominal thrusts if trained and indicated",trapAutopsy:"There is enough evidence of complete obstruction; assessment first is unsafe.",saferReasoningMove:"When immediate airway obstruction is obvious, intervene."}]},{id:"notify-provider-too-early",name:"Notify Provider Too Early",subtitle:"Escalating before the nurse-owned rescue step.",category:["NGN Reasoning","Medication","Safety/Psych"],dangerLevel:"Watch",scanCue:"calling before implementing immediate nursing actions that are within scope",whyLearnersFallForIt:"Provider notification sounds safe, especially when a value is abnormal, but NCLEX often tests what the nurse must do first.",clinicalDanger:"Waiting on a call can delay oxygen, stopping an unsafe infusion, fall prevention, glucose treatment, or isolation.",howToBeatIt:"Stabilize with standing orders, protocols, and scope-appropriate interventions before reporting.",redFlagCues:["unsafe infusion","low oxygen with simple positioning available","hypoglycemia protocol","fall in progress","new isolation symptoms"],trappedThinker:["The provider needs to know before I do anything.","Calling is always safest."],strongThinker:["What can I do right now while help is coming?","Does policy give a nurse-owned first step?"],nextTimeCoaching:"Notify after you protect the client from the immediate harm you can address.",miniCases:[{title:"Opioid Sedation First Step",clinicalTask:"Pick the immediate nursing response.",stem:"A client receiving IV morphine is difficult to arouse with RR 8/min and SpO2 88%.",priorityQuestion:"What should the nurse do first?",choices:["Notify the provider","Stop the opioid, stimulate the client, apply oxygen, and follow naloxone protocol","Document expected sedation","Ask the family to keep talking"],correctAnswer:"Stop the opioid, stimulate the client, apply oxygen, and follow naloxone protocol",trapAutopsy:"Calling is needed, but respiratory depression needs immediate nurse-owned rescue.",saferReasoningMove:"Remove the cause and support breathing before or while escalating."},{title:"Infiltrated Vesicant",clinicalTask:"Identify the first action.",stem:"A client receiving a vesicant chemotherapy reports burning at the IV site. The site is swollen and cool.",priorityQuestion:"Which action comes first?",choices:["Call the oncologist before touching the line","Stop the infusion and follow extravasation protocol","Increase the infusion rate","Apply a tight pressure dressing"],correctAnswer:"Stop the infusion and follow extravasation protocol",trapAutopsy:"Provider notification does not prevent ongoing tissue injury if the infusion continues.",saferReasoningMove:"Stop active harm first, then escalate according to protocol."},{title:"Fall In Motion",clinicalTask:"Choose immediate safety action.",stem:"A confused client is halfway out of bed, IV tubing stretched, and says the room is moving.",priorityQuestion:"What should the nurse do first?",choices:["Call the provider","Stay with the client and prevent the fall","Write an incident note","Ask the client to sign a fall contract"],correctAnswer:"Stay with the client and prevent the fall",trapAutopsy:"Notification can happen after the immediate risk of falling is controlled.",saferReasoningMove:"Prevent imminent harm before administrative or provider steps."},{title:"Isolation Before Call",clinicalTask:"Select the immediate infection control step.",stem:"A client admitted for cough now has fever, night sweats, weight loss, and blood-tinged sputum.",priorityQuestion:"What should the nurse do first?",choices:["Call the provider from the doorway","Place the client in airborne precautions per policy","Send family to the cafeteria","Wait for a sputum culture"],correctAnswer:"Place the client in airborne precautions per policy",trapAutopsy:"Provider notification is appropriate, but exposure control cannot wait.",saferReasoningMove:"Contain potential transmission immediately."},{title:"Critical Potassium on Digoxin",clinicalTask:"Prioritize medication safety.",stem:"A client scheduled for digoxin has potassium 3.0 mEq/L and an apical pulse of 58/min.",priorityQuestion:"What should the nurse do first?",choices:["Administer digoxin and notify later","Hold digoxin and notify the provider","Give an extra dose to improve contractility","Ask the client to stand for orthostatics"],correctAnswer:"Hold digoxin and notify the provider",trapAutopsy:"The nurse has enough safety data to withhold the medication before calling.",saferReasoningMove:"Do not administer a high-risk drug into known toxicity conditions."}]},{id:"pain-priority-trap",name:"Pain Priority Trap",subtitle:"Treating high pain score as automatic first priority.",category:["Safety/Psych","Circulation/Shock","NGN Reasoning"],dangerLevel:"Danger",scanCue:"choosing pain relief while instability, safety, or neurologic decline is present",whyLearnersFallForIt:"Pain numbers are concrete and distressing, so they can overpower subtle but dangerous physiologic cues.",clinicalDanger:"A pain-first shortcut can delay hemorrhage recognition, compartment syndrome, stroke response, or respiratory rescue.",howToBeatIt:"Treat pain promptly after checking whether another cue predicts loss of airway, perfusion, neuro function, or safety.",redFlagCues:["pain out of proportion","decreased pulses","new confusion","hypotension","respiratory depression"],trappedThinker:["The highest pain score comes first.","Pain is the fifth vital sign, so it outranks everything."],strongThinker:["Is pain the problem or a clue to a bigger threat?","Which client can deteriorate fastest?"],nextTimeCoaching:"Pain is urgent when it signals danger; comfort alone does not outrank instability.",miniCases:[{title:"Fracture Pain Out of Proportion",clinicalTask:"Recognize limb-threatening pain.",stem:"A client with a cast reports pain 10/10 unrelieved by opioids, numb toes, and pain with passive stretch.",priorityQuestion:"What is the nurse's priority?",choices:["Give the next opioid dose early","Notify the provider immediately for possible compartment syndrome","Reassure that fracture pain is expected","Apply heat to the cast"],correctAnswer:"Notify the provider immediately for possible compartment syndrome",trapAutopsy:"The trap is treating the pain score only. The neurovascular cluster is the emergency.",saferReasoningMove:"Interpret unusual pain as a cue, not just a symptom to suppress."},{title:"Pain Versus Airway Sedation",clinicalTask:"Prioritize post-op calls.",stem:"One post-op client rates pain 8/10. Another is hard to arouse after opioids, RR 7/min.",priorityQuestion:"Who should be seen first?",choices:["Client with pain 8/10","Client with RR 7/min and sedation","Client asking about diet","Client with mild nausea"],correctAnswer:"Client with RR 7/min and sedation",trapAutopsy:"Severe pain is important, but opioid respiratory depression is immediately life-threatening.",saferReasoningMove:"Protect ventilation before comfort interventions."},{title:"Chest Pain With Shock Cues",clinicalTask:"Choose the first nursing action.",stem:"A client reports chest pain 6/10, pale skin, HR 132, BP 84/50, and new crackles.",priorityQuestion:"Which action is priority?",choices:["Offer relaxation breathing","Activate emergency response and support oxygenation","Ask for a detailed pain diary","Delay until pain reaches 10/10"],correctAnswer:"Activate emergency response and support oxygenation",trapAutopsy:"The priority is not the numeric pain score; it is unstable perfusion and respiratory compromise.",saferReasoningMove:"Read pain in context of vital signs and perfusion."},{title:"Headache After Epidural",clinicalTask:"Identify a dangerous pattern.",stem:"A postpartum client reports severe headache, blurred vision, BP 168/104, and hyperreflexia.",priorityQuestion:"What is the priority concern?",choices:["Routine sleep deprivation","Possible postpartum preeclampsia requiring urgent treatment","Expected epidural soreness","Normal hunger headache"],correctAnswer:"Possible postpartum preeclampsia requiring urgent treatment",trapAutopsy:"Treating this as pain alone misses seizure risk.",saferReasoningMove:"Pair pain location with blood pressure and neurologic cues."},{title:"Abdominal Pain and Bleeding",clinicalTask:"Prioritize assessment in pregnancy.",stem:"A pregnant client has abdominal pain 5/10, rigid abdomen, scant dark vaginal bleeding, and fetal heart rate decelerations.",priorityQuestion:"Which action is safest?",choices:["Offer oral pain medication","Prepare for urgent obstetric evaluation","Teach round ligament pain","Encourage ambulation"],correctAnswer:"Prepare for urgent obstetric evaluation",trapAutopsy:"The pain score is moderate, but the pattern suggests abruption and fetal compromise.",saferReasoningMove:"Do not let a moderate pain number downgrade a high-risk cue cluster."}]},{id:"trend-blindness",name:"Trend Blindness",subtitle:"A single acceptable value hides a dangerous direction.",category:["Labs/Trends","NGN Reasoning","Circulation/Shock"],dangerLevel:"Critical",scanCue:"judging one value as fine while the series is deteriorating",whyLearnersFallForIt:"Learners memorize normal ranges and miss that NCLEX often tests direction, rate of change, and pattern.",clinicalDanger:"Early shock, kidney injury, respiratory failure, intracranial decline, or bleeding can be missed while values remain near normal.",howToBeatIt:"Compare current data to baseline and ask whether the trajectory predicts harm.",redFlagCues:["falling urine output","rising lactate","declining hemoglobin","worsening mental status","increasing oxygen need"],trappedThinker:["It is still within range, so it is not the answer.","I only need the latest number."],strongThinker:["What changed from baseline?","Is the rate of change clinically meaningful?"],nextTimeCoaching:"NCLEX loves trend recognition because safe nurses notice deterioration early.",miniCases:[{title:"Hemoglobin Drift",clinicalTask:"Interpret a post-op trend.",stem:"A post-op client's hemoglobin falls from 13.2 to 10.1 to 8.8 g/dL in 12 hours with HR rising to 118.",priorityQuestion:"Which interpretation is safest?",choices:["Hemoglobin is acceptable because it is above 8","The falling trend with tachycardia suggests bleeding","Tachycardia is only from anxiety","No action is needed until syncope occurs"],correctAnswer:"The falling trend with tachycardia suggests bleeding",trapAutopsy:"A borderline number becomes dangerous when direction and symptoms align.",saferReasoningMove:"Trend labs with vital signs, not ranges alone."},{title:"Urine Output Slide",clinicalTask:"Identify early perfusion decline.",stem:"A septic client's urine output changes from 45 to 25 to 12 mL/hr while BP drops from 118/70 to 94/58.",priorityQuestion:"What should the nurse recognize?",choices:["Expected sleep-related decrease","Worsening renal perfusion","Need to restrict all fluids","Normal output for sepsis recovery"],correctAnswer:"Worsening renal perfusion",trapAutopsy:"One hour of 25 mL could be watched; the downward series with BP decline is not benign.",saferReasoningMove:"Pair urine output trend with perfusion trend."},{title:"Oxygen Requirement Climb",clinicalTask:"Prioritize respiratory trend.",stem:"A pneumonia client was 94% on room air, then 92% on 2 L, now 91% on 5 L and more restless.",priorityQuestion:"Which action is priority?",choices:["Document that saturation is above 90","Escalate for worsening oxygenation","Remove oxygen to test baseline","Delay until morning rounds"],correctAnswer:"Escalate for worsening oxygenation",trapAutopsy:"The current number alone hides increasing oxygen demand and restlessness.",saferReasoningMove:"Escalate when support requirements rise."},{title:"Creatinine After Contrast",clinicalTask:"Spot kidney injury.",stem:"After contrast, creatinine rises from 0.8 to 1.3 to 1.8 mg/dL and urine is dark despite oral intake.",priorityQuestion:"What should the nurse report?",choices:["The trend suggesting acute kidney injury","Only the dark urine color","That 1.8 is always normal after contrast","That the client should avoid all fluids"],correctAnswer:"The trend suggesting acute kidney injury",trapAutopsy:"The issue is the rise from baseline, not a single number in isolation.",saferReasoningMove:"Use baseline comparison for renal safety."},{title:"Neuro Checks Getting Softer",clinicalTask:"Evaluate serial neurologic data.",stem:"After a head injury, a client goes from oriented x4 to confused about time to difficult to awaken over two checks.",priorityQuestion:"What is the priority response?",choices:["Let the client sleep uninterrupted","Report the neurologic decline immediately","Give a sedative","Recheck in six hours"],correctAnswer:"Report the neurologic decline immediately",trapAutopsy:"Each change might seem small, but the trend indicates possible intracranial deterioration.",saferReasoningMove:"Treat serial mental status decline as urgent."}]},{id:"expected-vs-unexpected-trap",name:"Expected vs Unexpected Trap",subtitle:"Expected discomfort hides unexpected danger.",category:["NGN Reasoning","Maternity/Peds","Safety/Psych"],dangerLevel:"Danger",scanCue:"normalizing unexpected changes because the client has a diagnosis or procedure that seems related",whyLearnersFallForIt:"Many symptoms are expected after procedures or in chronic disease, but NCLEX tests the one cue that does not fit.",clinicalDanger:"Unexpected findings can signal PE, hemorrhage, infection, stroke, medication toxicity, or fetal compromise.",howToBeatIt:"Ask what is expected for this situation, then circle the cue that changes risk.",redFlagCues:["new unilateral swelling","sudden confusion","foul drainage","absent fetal movement","pain with neurologic signs"],trappedThinker:["That diagnosis explains everything.","Post-op clients always have pain and fatigue."],strongThinker:["Which cue is not expected for this condition?","Does this finding predict complication?"],nextTimeCoaching:"Expected findings reassure only when the whole cluster fits.",miniCases:[{title:"Calf Pain After Surgery",clinicalTask:"Separate expected from unexpected.",stem:"A post-op client has incisional soreness but also new unilateral calf swelling, warmth, and tenderness.",priorityQuestion:"Which finding is unexpected and concerning?",choices:["Mild incisional soreness","New unilateral calf swelling and warmth","Sleepiness after anesthesia","Low appetite on day one"],correctAnswer:"New unilateral calf swelling and warmth",trapAutopsy:"Surgical discomfort is expected; DVT signs are not.",saferReasoningMove:"Find the cue that does not belong in routine recovery."},{title:"Postpartum Lochia Shift",clinicalTask:"Identify abnormal postpartum data.",stem:"Twelve hours after birth, a client has moderate lochia but suddenly saturates a pad in 10 minutes with clots.",priorityQuestion:"What should the nurse recognize?",choices:["Expected lochia rubra","Possible postpartum hemorrhage","Normal first void","Expected after breastfeeding"],correctAnswer:"Possible postpartum hemorrhage",trapAutopsy:"Lochia is expected; rapid saturation and clots are unexpected.",saferReasoningMove:"Use amount and speed, not the mere presence of bleeding."},{title:"COPD Confusion",clinicalTask:"Recognize a dangerous change.",stem:"A client with COPD usually has SpO2 90%. Today the client is newly confused and cannot complete sentences.",priorityQuestion:"Which cue makes this urgent?",choices:["Baseline SpO2 90%","New confusion with speech limitation","Long history of cough","Use of home inhaler"],correctAnswer:"New confusion with speech limitation",trapAutopsy:"The chronic oxygen level is expected; mental status and work of breathing are unexpected.",saferReasoningMove:"Compare to baseline function, not just the diagnosis."},{title:"PCA Drowsiness",clinicalTask:"Evaluate medication effect.",stem:"A client using PCA is drowsy after surgery. The unexpected finding is RR 8/min and pinpoint pupils.",priorityQuestion:"Which interpretation is safest?",choices:["Normal opioid comfort","Possible opioid toxicity","Expected hunger","Routine post-op boredom"],correctAnswer:"Possible opioid toxicity",trapAutopsy:"Some drowsiness is expected; respiratory depression is not.",saferReasoningMove:"Differentiate expected side effect from toxic effect."},{title:"Pediatric Fever Pattern",clinicalTask:"Identify pediatric warning cues.",stem:"A child with viral symptoms has fever and runny nose, but now has a nonblanching petechial rash and lethargy.",priorityQuestion:"Which cue is most concerning?",choices:["Runny nose","Nonblanching rash with lethargy","Low-grade fever earlier","Request for juice"],correctAnswer:"Nonblanching rash with lethargy",trapAutopsy:"Common viral symptoms can hide a dangerous unexpected rash and behavior change.",saferReasoningMove:"In children, behavior change plus rash escalates priority."}]},{id:"stable-chronic-distraction",name:"Stable Chronic Distraction",subtitle:"Chronic abnormal data steals attention from acute risk.",category:["NGN Reasoning","Labs/Trends","Circulation/Shock"],dangerLevel:"Watch",scanCue:"prioritizing a familiar chronic abnormality over a new acute cue",whyLearnersFallForIt:"Chronic diagnoses produce abnormal-looking values that feel serious but may be stable for that client.",clinicalDanger:"A new stroke, MI, bleed, infection, or safety event can be missed because a chronic issue looks more dramatic.",howToBeatIt:"Ask baseline versus new. Chronic stable problems matter less than acute changes with deterioration potential.",redFlagCues:["sudden onset","new neuro deficit","new chest pain","acute bleeding","baseline documented"],trappedThinker:["The worst-looking chronic condition must be first.","Abnormal equals urgent."],strongThinker:["What is new today?","Which finding is unstable compared with baseline?"],nextTimeCoaching:"Respect chronic illness, but prioritize acute changes.",miniCases:[{title:"Chronic Hypertension Versus Stroke",clinicalTask:"Prioritize acute change.",stem:"One client has BP 162/88, consistent with baseline. Another suddenly cannot lift the left arm and has slurred speech.",priorityQuestion:"Who should the nurse assess first?",choices:["Client with baseline hypertension","Client with sudden left arm weakness","Client asking for a snack","Client with chronic knee pain"],correctAnswer:"Client with sudden left arm weakness",trapAutopsy:"The blood pressure is abnormal but chronic; the neuro change is acute.",saferReasoningMove:"New focal deficits outrank stable chronic numbers."},{title:"Dialysis Lab Distraction",clinicalTask:"Interpret chronic renal data.",stem:"A dialysis client has creatinine 6.1 as usual. A different client has new crushing chest pain and diaphoresis.",priorityQuestion:"Which concern is priority?",choices:["Expected dialysis creatinine","New chest pain with diaphoresis","Request for phosphate binder","Chronic dry skin"],correctAnswer:"New chest pain with diaphoresis",trapAutopsy:"Chronic renal labs look alarming but are not the acute threat here.",saferReasoningMove:"Compare abnormal values to diagnosis and baseline."},{title:"Back Pain Baseline",clinicalTask:"Find red flags in a chronic complaint.",stem:"A client with chronic back pain now reports new urinary retention and saddle numbness.",priorityQuestion:"What is the priority interpretation?",choices:["Routine chronic pain flare","Possible cauda equina syndrome","Need for routine stretching","Expected opioid request"],correctAnswer:"Possible cauda equina syndrome",trapAutopsy:"The chronic label can cause under-triage of new neurologic red flags.",saferReasoningMove:"Look for new function loss inside chronic complaints."},{title:"Neuropathy Versus Foot Sepsis",clinicalTask:"Assess diabetic risk.",stem:"A client with diabetic neuropathy has a new foot ulcer, red streaking, fever, and glucose 356 mg/dL.",priorityQuestion:"Which issue is urgent?",choices:["Chronic numbness alone","Infection signs with hyperglycemia","Old shoe discomfort","Routine nail care"],correctAnswer:"Infection signs with hyperglycemia",trapAutopsy:"Neuropathy is chronic; spreading infection is acute.",saferReasoningMove:"Prioritize new infection and systemic cues."},{title:"Stable Atrial Fibrillation",clinicalTask:"Compare chronic rhythm and bleeding.",stem:"A client with chronic atrial fibrillation has HR 88. Another on warfarin has black stools and dizziness.",priorityQuestion:"Which client needs attention first?",choices:["Chronic atrial fibrillation with controlled rate","Warfarin client with melena and dizziness","Client asking about diet","Client with dry mouth"],correctAnswer:"Warfarin client with melena and dizziness",trapAutopsy:"The rhythm diagnosis sounds serious, but controlled chronic AF is less urgent than active bleeding.",saferReasoningMove:"Stable chronic diagnoses do not outrank acute bleeding cues."}]},{id:"select-n-over-selection",name:"Select-N Over-selection",subtitle:"SATA anxiety turns every true statement into an answer.",category:["NGN Reasoning","Medication","Delegation"],dangerLevel:"Watch",scanCue:"selecting options that are true in general but not indicated by the stem",whyLearnersFallForIt:"Select-all items create fear of missing an answer, so learners choose broad textbook facts instead of stem-linked actions.",clinicalDanger:"Over-selection can add unsafe actions, unnecessary interventions, or scope errors.",howToBeatIt:"For each option, require a direct cue from the stem and ask if the action is safe now.",redFlagCues:["select all","which interventions","requires follow-up","best actions","not all true facts apply"],trappedThinker:["This statement is true somewhere, so select it.","More answers feel safer."],strongThinker:["What in this stem justifies this option?","Does this action belong right now?"],nextTimeCoaching:"SATA is cue matching, not fact collecting.",miniCases:[{title:"Hypokalemia SATA",clinicalTask:"Select indicated interventions.",stem:"A client has K 2.9 mEq/L, weakness, and frequent PVCs on telemetry.",priorityQuestion:"Which actions are appropriate? Select all that apply.",choices:["Place on cardiac monitoring","Administer ordered potassium replacement safely","Give sodium polystyrene sulfonate","Assess for digoxin use","Encourage immediate vigorous exercise"],correctAnswer:"Place on cardiac monitoring; Administer ordered potassium replacement safely; Assess for digoxin use",trapAutopsy:"Over-selecting the hyperkalemia medication or exercise option ignores the actual low potassium cue.",saferReasoningMove:"Match every selected action to the specific lab direction and symptoms."},{title:"Neutropenic Precautions SATA",clinicalTask:"Choose infection-prevention measures.",stem:"A chemotherapy client has ANC 400/mm3 and temp 37.9 C.",priorityQuestion:"Which actions are appropriate? Select all that apply.",choices:["Perform hand hygiene before contact","Avoid fresh flowers","Place in protective precautions per policy","Administer live vaccine today","Screen visitors for illness"],correctAnswer:"Perform hand hygiene before contact; Avoid fresh flowers; Place in protective precautions per policy; Screen visitors for illness",trapAutopsy:"The live vaccine option is a true immunization concept in other contexts but unsafe here.",saferReasoningMove:"Reject true statements that conflict with the client's risk state."},{title:"Delegation SATA",clinicalTask:"Select tasks for assistive personnel.",stem:"The RN is caring for stable clients on a medical unit and has a trained UAP available.",priorityQuestion:"Which tasks can be delegated to UAP? Select all that apply.",choices:["Measure oral intake for a stable client","Ambulate a stable post-op client as directed","Teach insulin injection","Assess new chest pain","Obtain routine vital signs"],correctAnswer:"Measure oral intake for a stable client; Ambulate a stable post-op client as directed; Obtain routine vital signs",trapAutopsy:"Over-selecting teaching or assessment creates scope errors.",saferReasoningMove:"Delegate predictable, nonassessment tasks with stable clients."},{title:"Preeclampsia Report SATA",clinicalTask:"Identify reportable symptoms.",stem:"A pregnant client with preeclampsia is calling the clinic from home.",priorityQuestion:"Which symptoms should be reported immediately? Select all that apply.",choices:["Severe headache","Visual changes","Epigastric pain","Mild ankle swelling after standing","Decreased fetal movement"],correctAnswer:"Severe headache; Visual changes; Epigastric pain; Decreased fetal movement",trapAutopsy:"Mild dependent swelling can be common; the other cues predict maternal or fetal danger.",saferReasoningMove:"Separate expected pregnancy discomfort from warning cues."},{title:"Stroke Discharge SATA",clinicalTask:"Select safe teaching points.",stem:"A client recovering from a stroke has dysphagia and right-sided weakness.",priorityQuestion:"Which discharge teachings are appropriate? Select all that apply.",choices:["Sit upright for meals","Use prescribed thickened liquids","Keep call light on the weak side only","Remove throw rugs","Take large bites to finish before fatigue"],correctAnswer:"Sit upright for meals; Use prescribed thickened liquids; Remove throw rugs",trapAutopsy:"Over-selection adds unsafe shortcuts that increase aspiration or fall risk.",saferReasoningMove:"Choose actions that reduce the specific dysphagia and mobility risks."}]},{id:"all-abnormal-cues-trap",name:"All Abnormal Cues Trap",subtitle:"Every abnormal finding feels equally important.",category:["Labs/Trends","NGN Reasoning","Medication"],dangerLevel:"Danger",scanCue:"giving the same weight to mild, chronic, expected, and life-threatening abnormalities",whyLearnersFallForIt:"NGN cases show many abnormal cues; learners may collect them without ranking danger.",clinicalDanger:"The critical cue can be buried under mild lab changes, chronic abnormalities, or expected symptoms.",howToBeatIt:"Sort cues by instability, change from baseline, and whether a nurse must act now.",redFlagCues:["potassium with ECG changes","lactate elevation","new confusion","low BP","active bleeding"],trappedThinker:["Everything abnormal goes into the same pile.","The longest list must be the priority."],strongThinker:["Which abnormal cue changes immediate safety?","Which one is expected or low-risk?"],nextTimeCoaching:"Do not collect abnormalities; rank them by danger.",miniCases:[{title:"Mild Sodium Versus Hyperkalemia",clinicalTask:"Rank lab danger.",stem:"A client has sodium 132 mEq/L, albumin 3.1 g/dL, potassium 6.4 mEq/L, and peaked T waves.",priorityQuestion:"Which cue is most urgent?",choices:["Sodium 132","Albumin 3.1","Potassium 6.4 with peaked T waves","Mild dry skin"],correctAnswer:"Potassium 6.4 with peaked T waves",trapAutopsy:"Several values are abnormal, but one can cause lethal dysrhythmia.",saferReasoningMove:"Rank abnormal cues by immediate physiologic threat."},{title:"Sepsis Cue Sorting",clinicalTask:"Identify the most dangerous cluster.",stem:"A client has WBC 12,000, temp 38.4 C, lactate 4.5, BP 86/48, and flushed skin.",priorityQuestion:"Which data pair should drive action?",choices:["Flushed skin and mild leukocytosis","Lactate 4.5 and BP 86/48","Temperature alone","Slight thirst"],correctAnswer:"Lactate 4.5 and BP 86/48",trapAutopsy:"WBC and fever matter, but perfusion and lactate identify shock risk.",saferReasoningMove:"Cluster abnormalities into severity levels."},{title:"COPD ABG Noise",clinicalTask:"Differentiate baseline from crisis.",stem:"A COPD client's usual PaCO2 is high. Today the client is somnolent, pH 7.25, PaCO2 78, and RR 8.",priorityQuestion:"Which cue is most urgent?",choices:["Chronic high PaCO2 alone","Acidemia with somnolence and RR 8","Barrel chest","Long smoking history"],correctAnswer:"Acidemia with somnolence and RR 8",trapAutopsy:"The chronic abnormality is less important than decompensated ventilation.",saferReasoningMove:"Find the abnormality that represents a dangerous change."},{title:"Pancytopenia Priority",clinicalTask:"Pick immediate follow-up.",stem:"A leukemia client has Hgb 8.7, platelets 18,000, WBC 2,000, and new bleeding from gums.",priorityQuestion:"Which finding is most urgent?",choices:["Fatigue from anemia","Platelets 18,000 with active bleeding","Low WBC without fever","Hair loss"],correctAnswer:"Platelets 18,000 with active bleeding",trapAutopsy:"All counts are abnormal, but active bleeding plus severe thrombocytopenia is immediate.",saferReasoningMove:"Pair lab severity with current symptoms."},{title:"Pancreatitis Lab Mix",clinicalTask:"Identify deterioration.",stem:"A pancreatitis client has amylase elevation, calcium 7.2 mg/dL, confusion, and hypotension.",priorityQuestion:"Which pattern needs urgent action?",choices:["Amylase elevated as expected","Confusion and hypotension","Nausea after meals","Mild abdominal bloating"],correctAnswer:"Confusion and hypotension",trapAutopsy:"Expected disease labs can distract from shock and mental status change.",saferReasoningMove:"Abnormal is not enough; decide which abnormal predicts collapse."}]},{id:"teaching-before-safety",name:"Teaching Before Safety",subtitle:"Education is chosen before the immediate threat is controlled.",category:["Safety/Psych","Medication","Maternity/Peds"],dangerLevel:"Danger",scanCue:"selecting education while the patient is unstable, unsafe, or not ready to learn",whyLearnersFallForIt:"Nursing education is important and often tested, so learners may choose it before urgent safety steps.",clinicalDanger:"Teaching can delay airway rescue, bleeding control, hypoglycemia treatment, suicide precautions, or seizure prevention.",howToBeatIt:"Ask if the client can safely learn right now. If not, stabilize first and teach later.",redFlagCues:["altered mental status","active bleeding","respiratory distress","suicidal intent","critical glucose"],trappedThinker:["NCLEX likes teaching, so choose education.","If the patient needs knowledge, teaching is priority."],strongThinker:["Can this client learn safely right now?","What harm must be prevented before education?"],nextTimeCoaching:"Teaching is high value after safety is restored.",miniCases:[{title:"Warfarin Bleed Teaching Delay",clinicalTask:"Prioritize anticoagulation safety.",stem:"A client on warfarin asks about diet while reporting black stools, dizziness, and weakness.",priorityQuestion:"What is the priority response?",choices:["Teach vitamin K foods first","Assess bleeding and vital signs immediately","Schedule routine follow-up","Give printed diet handout"],correctAnswer:"Assess bleeding and vital signs immediately",trapAutopsy:"Diet teaching is relevant, but active bleeding cues require safety assessment and escalation.",saferReasoningMove:"Do not teach through an active complication."},{title:"Hypoglycemia Education Timing",clinicalTask:"Select immediate intervention.",stem:"A client learning insulin administration becomes pale, shaky, and has glucose 52 mg/dL.",priorityQuestion:"What should the nurse do first?",choices:["Continue injection teaching","Treat hypoglycemia","Review carbohydrate counting","Ask the client to read the insulin label"],correctAnswer:"Treat hypoglycemia",trapAutopsy:"Learning cannot occur safely during symptomatic hypoglycemia.",saferReasoningMove:"Restore physiologic stability before education."},{title:"Infant Apnea Before Sleep Teaching",clinicalTask:"Prioritize pediatric response.",stem:"A parent asks about safe sleep. The infant in the crib has pauses in breathing and dusky lips.",priorityQuestion:"Which action is priority?",choices:["Teach back-to-sleep positioning","Stimulate and assess the infant's airway and breathing","Give a brochure","Discuss crib mattress firmness"],correctAnswer:"Stimulate and assess the infant's airway and breathing",trapAutopsy:"Safe sleep teaching matters, but apnea is immediate.",saferReasoningMove:"Address life threats before anticipatory guidance."},{title:"Suicide Contract Trap",clinicalTask:"Choose psych safety action.",stem:"A client says, 'I understand the coping skills, but I have pills hidden and will use them tonight.'",priorityQuestion:"What should the nurse do first?",choices:["Review the coping skill worksheet","Ensure constant observation and remove access to means","Ask the client to journal","Teach sleep hygiene"],correctAnswer:"Ensure constant observation and remove access to means",trapAutopsy:"Education is not enough when specific means and intent are present.",saferReasoningMove:"Use direct safety controls before teaching."},{title:"Asthma Inhaler Teaching",clinicalTask:"Recognize readiness to learn.",stem:"A client with asthma wants inhaler teaching but is leaning forward, speaking one-word answers, and using accessory muscles.",priorityQuestion:"What is priority?",choices:["Demonstrate spacer use immediately","Provide acute respiratory support per protocol","Give written materials","Ask about preferred learning style"],correctAnswer:"Provide acute respiratory support per protocol",trapAutopsy:"The client cannot learn while in severe respiratory distress.",saferReasoningMove:"Stabilize work of breathing before teaching technique."}]},{id:"delegation-rn-only-trap",name:"Delegation RN-only Trap",subtitle:"Keeping everything or delegating clinical judgment incorrectly.",category:["Delegation","Safety/Psych","NGN Reasoning"],dangerLevel:"Watch",scanCue:"either refusing safe delegation or assigning assessment, teaching, or unstable care outside scope",whyLearnersFallForIt:"Delegation feels risky, so learners either keep all tasks or miss the difference between task and judgment.",clinicalDanger:"Unsafe delegation can miss deterioration; under-delegation can delay priority RN work.",howToBeatIt:"Delegate stable, predictable, routine tasks; keep assessment, teaching, evaluation, and unstable clients with the RN.",redFlagCues:["new admission","unstable vital signs","initial teaching","evaluation needed","routine hygiene or vitals"],trappedThinker:["The RN must do everything important.","UAP can report findings, so they can assess."],strongThinker:["Is this a task or clinical judgment?","Is the client stable and outcome predictable?"],nextTimeCoaching:"Safe delegation protects RN bandwidth for unstable clients.",miniCases:[{title:"UAP Walking Assignment",clinicalTask:"Choose a task to delegate.",stem:"The RN has a stable client one day after appendectomy who needs hallway ambulation and another client with new chest pain.",priorityQuestion:"Which task can be delegated?",choices:["Assess new chest pain","Ambulate the stable post-op client with instructions","Teach discharge medications","Evaluate response to nitroglycerin"],correctAnswer:"Ambulate the stable post-op client with instructions",trapAutopsy:"The RN should not keep routine ambulation when an unstable client needs assessment.",saferReasoningMove:"Delegate predictable mobility tasks and reserve RN judgment for acute changes."},{title:"LPN Dressing Task",clinicalTask:"Apply scope of practice.",stem:"A stable client needs a scheduled sterile dressing change for a chronic wound. Another client needs initial wound assessment after surgery.",priorityQuestion:"Which assignment is appropriate for the LPN/LVN?",choices:["Initial post-op wound assessment","Scheduled dressing change for a stable chronic wound","New teaching about wound care","Evaluation of worsening infection"],correctAnswer:"Scheduled dressing change for a stable chronic wound",trapAutopsy:"The trap is making every wound RN-only. Stability and routine nature matter.",saferReasoningMove:"Separate implementation from assessment and evaluation."},{title:"New Confusion Cannot Delegate",clinicalTask:"Avoid unsafe delegation.",stem:"A UAP offers to help with a client who is newly confused and pulling at oxygen tubing.",priorityQuestion:"Which task must the RN do?",choices:["Initial assessment of new confusion","Obtain a routine water refill","Transport stable specimen","Record meal percentage"],correctAnswer:"Initial assessment of new confusion",trapAutopsy:"New mental status change requires RN assessment, not simple observation.",saferReasoningMove:"Keep new, unstable, or changing conditions with the RN."},{title:"Blood Transfusion Check",clinicalTask:"Assign during transfusion care.",stem:"A client receiving blood develops chills and back pain. A UAP is available on the unit.",priorityQuestion:"Which action is RN responsibility?",choices:["Evaluate possible transfusion reaction","Deliver a clean blanket to another stable client","Restock gloves","Record an already measured output"],correctAnswer:"Evaluate possible transfusion reaction",trapAutopsy:"Transfusion reaction cues require RN assessment and intervention.",saferReasoningMove:"Never delegate evaluation of an acute adverse reaction."},{title:"Discharge Teaching Boundary",clinicalTask:"Delegate safely.",stem:"A client with new heart failure is being discharged and needs medication and weight-monitoring teaching.",priorityQuestion:"Which assignment is appropriate?",choices:["Ask UAP to teach daily weights","Have RN provide discharge teaching","Ask UAP to evaluate understanding","Delegate medication teaching to transport staff"],correctAnswer:"Have RN provide discharge teaching",trapAutopsy:"Teaching and evaluating understanding require RN judgment.",saferReasoningMove:"Delegate support tasks, not education plans."}]},{id:"isolation-delay",name:"Isolation Delay",subtitle:"Waiting for confirmation while exposure risk spreads.",category:["Infection/Isolation","Safety/Psych","NGN Reasoning"],dangerLevel:"Critical",scanCue:"delaying precautions until cultures, provider orders, or final diagnosis return",whyLearnersFallForIt:"Learners may think isolation is a provider order rather than an immediate nursing infection-control action based on suspected transmission.",clinicalDanger:"Delayed precautions can expose staff, other clients, newborns, immunocompromised clients, or family members.",howToBeatIt:"Use suspected route of transmission and initiate the matching precautions per policy while evaluation continues.",redFlagCues:["productive cough with night sweats","watery diarrhea after antibiotics","vesicular rash","meningitis signs","fever with cough"],trappedThinker:["Wait for the culture to prove it.","The provider must write isolation first."],strongThinker:["What transmission route is possible now?","Which precaution prevents exposure while we confirm?"],nextTimeCoaching:"Isolation is a safety action, not a final diagnosis.",miniCases:[{title:"Possible TB Admission",clinicalTask:"Choose isolation precautions.",stem:"A client has cough for three weeks, hemoptysis, night sweats, weight loss, and recent shelter exposure.",priorityQuestion:"What should the nurse initiate?",choices:["Airborne precautions","Contact precautions only","No precautions until sputum results","Droplet precautions for meals only"],correctAnswer:"Airborne precautions",trapAutopsy:"Waiting for confirmation exposes others if TB is possible.",saferReasoningMove:"Match suspected TB to airborne control immediately."},{title:"Antibiotic Diarrhea",clinicalTask:"Prevent transmission.",stem:"A hospitalized client has frequent foul watery stools after clindamycin therapy.",priorityQuestion:"Which action is safest?",choices:["Use contact enteric precautions","Give hand sanitizer only","Wait for stool test before precautions","Move the client to the playroom"],correctAnswer:"Use contact enteric precautions",trapAutopsy:"Suspected C. difficile requires immediate contact enteric measures.",saferReasoningMove:"Protect the unit while diagnostic testing is pending."},{title:"Varicella Exposure",clinicalTask:"Identify precaution route.",stem:"An adult has fever and diffuse itchy vesicles in different stages of healing.",priorityQuestion:"Which precaution is needed?",choices:["Airborne and contact precautions","Standard precautions only","Protective isolation","Droplet precautions only"],correctAnswer:"Airborne and contact precautions",trapAutopsy:"The rash pattern is enough to protect others before lab confirmation.",saferReasoningMove:"Use transmission route cues quickly."},{title:"Meningitis Signs",clinicalTask:"Select immediate infection control.",stem:"A client presents with fever, severe headache, nuchal rigidity, and petechial rash.",priorityQuestion:"What should the nurse implement?",choices:["Droplet precautions","No precautions until lumbar puncture","Airborne precautions for all visitors","Reverse isolation"],correctAnswer:"Droplet precautions",trapAutopsy:"Suspected bacterial meningitis warrants droplet precautions while evaluation proceeds.",saferReasoningMove:"Do not wait to contain suspected droplet spread."},{title:"Influenza on Oncology Unit",clinicalTask:"Prevent unit exposure.",stem:"A visitor tells the nurse they have fever, body aches, and cough while entering an oncology room.",priorityQuestion:"What should the nurse do first?",choices:["Ask the visitor to leave the patient area and follow facility screening policy","Offer coffee","Wait for a viral panel","Allow visit if wearing regular clothes"],correctAnswer:"Ask the visitor to leave the patient area and follow facility screening policy",trapAutopsy:"Infection control includes visitors; delay can harm immunocompromised clients.",saferReasoningMove:"Control exposure at the point of recognition."}]},{id:"medication-safety-blind-spot",name:"Medication Safety Blind Spot",subtitle:"Medication risks are treated as routine tasks.",category:["Medication","Labs/Trends","Circulation/Shock"],dangerLevel:"Critical",scanCue:"administering or continuing a high-risk medication despite contraindicating cues",whyLearnersFallForIt:"Medication questions can look like routine administration unless the learner connects labs, vitals, and adverse effects.",clinicalDanger:"Blind administration can cause dysrhythmias, bleeding, respiratory depression, hypoglycemia, or renal injury.",howToBeatIt:"Before high-risk meds, pause for the one lab, vital sign, or assessment finding that would stop the dose.",redFlagCues:["bradycardia before digoxin","platelet fall on heparin","RR below 10 on opioids","potassium abnormality","creatinine rise"],trappedThinker:["It is ordered, so give it.","Medication administration is routine."],strongThinker:["What condition makes this dose unsafe?","What must I check before giving?"],nextTimeCoaching:"Orders do not override bedside safety checks.",miniCases:[{title:"Digoxin and Bradycardia",clinicalTask:"Decide whether to administer.",stem:"A client is due for digoxin. Apical pulse is 52/min and potassium is 3.1 mEq/L.",priorityQuestion:"What should the nurse do?",choices:["Administer because it is scheduled","Hold the dose and notify the provider","Give with grapefruit juice","Double-check radial pulse only"],correctAnswer:"Hold the dose and notify the provider",trapAutopsy:"Bradycardia and hypokalemia increase digoxin toxicity risk.",saferReasoningMove:"Check stop signs before cardiac glycosides."},{title:"Heparin Platelet Drop",clinicalTask:"Recognize adverse reaction risk.",stem:"A client on heparin has platelets drop from 240,000 to 92,000/mm3 and reports new leg pain.",priorityQuestion:"Which action is priority?",choices:["Continue heparin and recheck next week","Hold heparin and report possible HIT","Massage the leg","Apply sequential compression only"],correctAnswer:"Hold heparin and report possible HIT",trapAutopsy:"The medication is the danger source; continuing it can worsen thrombosis and thrombocytopenia.",saferReasoningMove:"Link platelet trend to heparin exposure."},{title:"KCl Route Trap",clinicalTask:"Identify unsafe administration.",stem:"An order reads potassium chloride 40 mEq IV push now for K 2.8 mEq/L.",priorityQuestion:"What should the nurse do?",choices:["Administer IV push slowly","Question the order; potassium is never given IV push","Give through a small hand vein undiluted","Mix into orange juice for IV use"],correctAnswer:"Question the order; potassium is never given IV push",trapAutopsy:"Correcting low potassium matters, but the ordered route is unsafe.",saferReasoningMove:"Safety of route can outrank the need for replacement."},{title:"ACE Inhibitor and Potassium",clinicalTask:"Spot interaction risk.",stem:"A client taking lisinopril asks if they should continue salt substitute. Potassium is 5.6 mEq/L.",priorityQuestion:"Which response is safest?",choices:["Encourage extra salt substitute","Hold potassium-containing substitute and notify provider","Ignore because it is over the counter","Recommend banana smoothies"],correctAnswer:"Hold potassium-containing substitute and notify provider",trapAutopsy:"Over-the-counter products can worsen medication-related hyperkalemia.",saferReasoningMove:"Connect meds, supplements, and labs."},{title:"Opioid Respiratory Check",clinicalTask:"Determine safe dosing.",stem:"A client requests prescribed hydromorphone. RR is 9/min and the client drifts to sleep mid-sentence.",priorityQuestion:"What should the nurse do?",choices:["Give the medication for pain","Hold opioid and assess sedation/oxygenation","Wake the client only after dosing","Increase the dose"],correctAnswer:"Hold opioid and assess sedation/oxygenation",trapAutopsy:"Pain request should not override respiratory de   ];
  var ALLOWED_TRAP = 'ABC Tunnel Vision';
  function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,' ').trim();}
  function lockedLabelFor(el){
    var t = (el && el.textContent || '').replace(/\s+/g,' ').trim();
    if(!t || t.length > 180) return '';
    if(t.indexOf(ALLOWED_TRAP) !== -1) return '';
    return LOCKED.find(function(label){return t === label || t.indexOf(label) !== -1;}) || '';
  }
  function isDemoNav(el){return !!(el && el.closest && el.closest('#nexusV175DecisionDemoNav,#nexusV173DecisionDemoNav,#nexusV178TrapPreviewCard'))}
  function style(){
    if(document.getElementById('nexusV178TrapLockStyle')) return;
    var st=document.createElement('style'); st.id='nexusV178TrapLockStyle';
    st.textContent=''+
      '.nexus-v178-locked-trap-category{position:relative!important;cursor:not-allowed!important;opacity:.68!important;filter:saturate(.72)!important;border-color:rgba(148,163,184,.24)!important;background:rgba(15,23,42,.58)!important;color:#93a4b8!important;box-shadow:none!important;}'+
      '.nexus-v178-locked-trap-category:after{content:"  🔒 Full Lab";display:inline-flex;margin-left:6px;color:#fde68a;font-weight:950;font-size:.82em;letter-spacing:.02em;}'+
      '.nexus-v178-locked-trap-category:hover{transform:none!important;box-shadow:none!important;}'+
      '.nexus-v178-trap-focus-ring{position:fixed;inset:auto 18px 86px auto;z-index:999998;max-width:min(420px,calc(100vw - 36px));border:1px solid rgba(45,212,191,.34);border-radius:24px;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.94));color:#dff8ff;font:800 13px/1.45 Inter,system-ui,sans-serif;box-shadow:0 24px 88px rgba(0,0,0,.40),0 0 0 1px rgba(34,211,238,.08),0 0 48px rgba(20,184,166,.12);padding:16px 18px;overflow:hidden;backdrop-filter:blur(16px)}'+
      '.nexus-v178-trap-focus-ring:before{content:"";position:absolute;inset:0;border-radius:24px;background:linear-gradient(115deg,transparent,rgba(34,211,238,.18),transparent 42%);transform:translateX(-80%);animation:nexusV178LaserNote 5.4s ease-in-out infinite;pointer-events:none}.nexus-v178-trap-focus-ring>*{position:relative}.nexus-v178-trap-focus-ring b{display:block;color:#5eead4;font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}.nexus-v178-trap-focus-ring strong{color:#fff}.nexus-v178-trap-focus-ring .spark{color:#67e8f9;text-shadow:0 0 16px rgba(34,211,238,.75);animation:nexusV178Spark 2.6s ease-in-out infinite;display:inline-block;margin-right:4px}.nexus-v178-trap-focus-ring small{display:block;color:#a7bed1;margin-top:6px;font-weight:700}'+
      '@keyframes nexusV178LaserNote{0%{transform:translateX(-90%);opacity:0}14%{opacity:1}56%{transform:translateX(92%);opacity:.8}100%{transform:translateX(92%);opacity:0}}@keyframes nexusV178Spark{0%,100%{transform:scale(.9);opacity:.65}45%{transform:scale(1.12);opacity:1}}'+
      '@media(prefers-reduced-motion:reduce){.nexus-v178-trap-focus-ring:before,.nexus-v178-trap-focus-ring .spark{animation:none!important}.nexus-v178-trap-focus-ring:before{display:none!important}}';
    document.head.appendChild(st);
  }
  function ensurePreviewCard(){
    if(document.getElementById('nexusV178TrapPreviewCard')) return;
    var d=document.createElement('div'); d.id='nexusV178TrapPreviewCard'; d.className='nexus-v178-trap-focus-ring'; d.setAttribute('role','note');
    d.innerHTML='<b>Public Preview</b><div><span class="spark" aria-hidden="true">✦</span><strong>One Trap Radar walkthrough is unlocked.</strong></div><small>Full Decision Lab opens every trap category, priority model, and guided recovery path.</small>';
    document.body.appendChild(d);
  }
  function lockEl(el){
    if(!el || isDemoNav(el)) return false;
    var label=lockedLabelFor(el);
    if(!label) return false;
    el.setAttribute('data-nexus-v178-locked-trap-category', label);
    el.setAttribute('aria-disabled','true');
    el.setAttribute('title','Available in the full Decision Lab.');
    el.classList.add('nexus-v178-locked-trap-category');
    if(el.tagName && el.tagName.toLowerCase()==='button'){
      el.disabled = true;
    }else{
      el.setAttribute('tabindex','-1');
    }
    return true;
  }
  function lockCategories(){
    var selectors='button,[role="button"],a,[tabindex],div[class*="cursor-pointer"],span[class*="cursor-pointer"],[class*="rounded-full"],[class*="chip"]';
    Array.from(document.querySelectorAll(selectors)).forEach(lockEl);
  }
  function keepABCFocused(){
    var candidates=Array.from(document.querySelectorAll('button,[role="button"],a,div[class*="cursor-pointer"],span[class*="cursor-pointer"]'));
    var abc=candidates.filter(function(el){var t=norm(el.textContent); return t.indexOf(norm(ALLOWED_TRAP))!==-1 && !isDemoNav(el);})[0];
    if(abc){try{abc.classList.add('nexus-v178-public-demo-active-trap');}catch(e){}}
  }
  function isLockedEventTarget(target){
    return !!(target && target.closest && target.closest('[data-nexus-v178-locked-trap-category]'));
  }
  ['click','pointerdown','mousedown','touchstart'].forEach(function(type){
    document.addEventListener(type,function(ev){
      if(!isLockedEventTarget(ev.target)) return;
      ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
    },true);
  });
  document.addEventListener('keydown',function(ev){
    if((ev.key==='Enter'||ev.key===' ') && isLockedEventTarget(ev.target)){
      ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
    }
  },true);
  function apply(){ style(); ensurePreviewCard(); lockCategories(); keepABCFocused(); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',apply); else apply();
  window.addEventListener('load',function(){apply(); setTimeout(apply,350); setTimeout(apply,900); setTimeout(apply,1800);});
  var obsTimer=setInterval(apply,900); setTimeout(function(){clearInterval(obsTimer); apply();},18000);
  try{ new MutationObserver(function(){apply();}).observe(document.documentElement,{subtree:true,childList:true}); }catch(e){}
  var previous = window.NEXUS_DECISION_LAB_PUBLIC_DEMO_AUDIT;
  window.NEXUS_PUBLIC_DEMO_TRAP_RADAR_AUDIT = function(){
    var base={}; try{ if(typeof previous==='function') base=previous(); }catch(e){base={baseAuditError:String(e&&e.message||e)}}
    var lockedNodes = Array.from(document.querySelectorAll('[data-nexus-v178-locked-trap-category]'));
    var found = lockedNodes.map(function(el){return el.getAttribute('data-nexus-v178-locked-trap-category');}).filter(Boolean);
    return Object.assign({}, base, {
      version:'v178-public-demo-trap-radar-category-lock',
      publicDemoTrapRadarGuard:true,
      module:'trap-radar',
      activeTrap:'ABC Tunnel Vision',
      lockedCategories:LOCKED.slice(),
      lockedCategoryCount:LOCKED.length,
      lockedCategoryNodes:lockedNodes.length,
      lockedCategoryLabelsFound:Array.from(new Set(found)),
      lockedOnlyInPublicDemo:true,
      clickGuardInstalled:true,
      keyboardGuardInstalled:true,
      publicPreviewCardPresent:!!document.getElementById('nexusV178TrapPreviewCard'),
      fullDecisionLabUnaffected:true,
      trapRadarStillLoads:true,
      fixedDemoOnly:true,
      technicalCardsDebugOnly:true,
      laserPreviewCard:true,
      sparklePreviewPoint:true,
      reducedMotionSupported:true,
      paidBankBrowsingExposed:false,
      questionDbMutated:false
    });
  };
  var priorDecisionAudit = window.NEXUS_DECISION_LAB_PUBLIC_DEMO_AUDIT;
  window.NEXUS_DECISION_LAB_PUBLIC_DEMO_AUDIT = function(){
    var base={}; try{ if(typeof priorDecisionAudit==='function') base=priorDecisionAudit(); }catch(e){base={baseAuditError:String(e&&e.message||e)}}
    var trapAudit = window.NEXUS_PUBLIC_DEMO_TRAP_RADAR_AUDIT();
    return Object.assign({}, base, {version:'v178-decisionlab-public-demo-with-trap-category-lock', trapRadarCategoryLock:trapAudit});
  };
  window.NEXUS_V178_PUBLIC_DEMO_TRAP_RADAR_AUDIT = window.NEXUS_PUBLIC_DEMO_TRAP_RADAR_AUDIT;
})();
</script>
