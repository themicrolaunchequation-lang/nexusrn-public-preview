ioritize-hypotheses-2","Anxiety or Hypoglycemia","Identify highest-risk explanation.","A diabetic client is shaky, sweating, irritable, and has glucose 46 mg/dL.","Which hypothesis should be prioritized?",["Anxiety could cause shakiness","Glucose confirms physiologic threat","Sweating and irritability fit hypoglycemia","Immediate treatment prevents seizure"],"Prioritize hypoglycemia.","Offer calming techniques before checking the glucose result.","Objective data should move the hypothesis from emotional interpretation to physiologic rescue."),je("prioritize-hypotheses-3","Pain or Compartment Syndrome","Rank post-injury hypotheses.","A casted client has pain unrelieved by opioids, numbness, pallor, and pain with passive stretch.","Which hypothesis is priority?",["Pain is expected after fracture","Unrelieved pain is abnormal","Neurovascular signs add danger","Compartment syndrome threatens limb perfusion"],"Prioritize compartment syndrome.","Treat as routine post-fracture pain.","Dangerous hypotheses are supported by cue clusters that are not expected."),je("prioritize-hypotheses-4","Withdrawal or Insomnia","Prioritize psych-medical risk.","A client with alcohol use disorder is restless, tremulous, diaphoretic, hypertensive, and reports insects on the wall.","Which hypothesis should lead?",["Insomnia explains restlessness poorly","Autonomic signs suggest withdrawal","Hallucinations increase severity","Seizure and delirium risk are high"],"Prioritize severe alcohol withdrawal.","Offer sleep hygiene teaching only.","Psych symptoms plus autonomic activation can represent a medical emergency."),je("prioritize-hypotheses-5","Expected Fever or Meningitis","Rank pediatric hypotheses.","A child has fever, stiff neck, petechiae, photophobia, and becomes hard to console.","Which hypothesis is most urgent?",["Viral illness is common","Stiff neck and photophobia are meningeal cues","Petechiae is a red flag","Rapid isolation and escalation are needed"],"Prioritize possible meningitis.","Treat as routine fever without precautions.","Prioritization weights rare but dangerous patterns when the cues fit.")]},{id:"generate-solutions",name:"Generate Solutions",plainMeaning:"Identify safe nursing actions that address the priority problem.",clinicalTask:"Choose interventions that match the hypothesis and scope.",commonFailurePattern:"The learner jumps to provider notification, teaching, or assessment without considering nurse-owned actions.",expertReasoningMove:"Generate actions that reduce immediate risk, then decide which is first.",reasoningLadder:["Name the priority problem","List nurse-owned safety actions","Include protocol or standing orders","Remove unsafe or delayed actions","Prepare escalation support"],examples:[je("generate-solutions-1","Hypoglycemia Without Safe Swallow","Select safe interventions.","A confused client has glucose 39 mg/dL and cannot follow commands to swallow.","Which solution should be generated?",["Problem is severe hypoglycemia","Oral carbohydrate is unsafe","IV dextrose or glucagon per protocol fits","Recheck glucose and reassess after treatment"],"Generate route-safe glucose rescue.","Offer juice despite unsafe swallow.","Solutions must match both the problem and the client's ability to tolerate the intervention."),je("generate-solutions-2","Suspected C. difficile","Choose infection-control actions.","A client has watery diarrhea after antibiotics and abdominal cramping.","Which solution protects others now?",["Suspected route is contact enteric","Private room and gown/gloves reduce spread","Soap-and-water hand hygiene matters","Testing can occur after precautions start"],"Generate immediate contact enteric precautions.","Wait for the stool result before any isolation.","Prevention actions are appropriate while confirmation is pending."),je("generate-solutions-3","Fall Risk in Motion","Generate immediate safety steps.","A sedated older adult is trying to climb over side rails and the bed alarm is sounding.","Which rst medication action.","A client receiving vancomycin develops flushing, itching, and hypotension during the infusion.","What is the first action?",["Reaction is happening now","Infusion is the active exposure","Stop or slow per policy and assess","Escalate after active harm is addressed"],"Stop the infusion and assess according to policy.","Finish the bag because it is antibiotic therapy.","Taking action often starts by removing the active source of harm."),je("take-action-2","Boggy Uterus","Choose first postpartum action.","A client has heavy lochia and a boggy uterus one hour after birth.","What is first?",["Problem is uterine atony","Fundal massage can restore tone","Call for help if bleeding persists","Assess vitals and bladder"],"Massage the fundus immediately.","Leave to call the provider before addressing uterine tone.","The first action should directly reverse the likely cause of bleeding."),je("take-action-3","Complete Airway Obstruction","Act during choking.","A client suddenly cannot speak or cough and grasps the throat while eating.","What should the nurse do?",["Complete obstruction is present","Assessment delay is unsafe","Perform indicated choking intervention","Call for help as needed"],"Begin abdominal thrusts if trained and indicated.","Ask the client to rate dyspnea first.","When the life threat is obvious, action replaces further assessment."),je("take-action-4","Possible Stroke","Trigger time-sensitive pathway.","A client suddenly has facial droop, arm drift, and slurred speech beginning 15 minutes ago.","What is the immediate action?",["Focal deficits are new","Time window matters","Activate stroke response","Keep client NPO until swallow evaluated"],"Activate the stroke response process.","Wait to see whether the symptoms resolve after a nap.","Taking action uses clinical pathways when delay changes outcomes."),je("take-action-5","Suicide Means Present","Act on imminent self-harm risk.","A client states a plan to overdose tonight and has pills hidden in the bag at bedside.","What is first?",["Intent and means are present","Environmental safety must change","Stay with client and remove means per policy","Notify team after safety is secured"],"Maintain observation and secure the pills according to policy.","Ask the client to promise not to self-harm and leave.","Safety action is required when means and intent are active.")]},{id:"evaluate-outcomes",name:"Evaluate Outcomes",plainMeaning:"Check whether the action worked and what should change next.",clinicalTask:"Reassess targeted cues and decide whether to continue, modify, or escalate.",commonFailurePattern:"The learner stops after the intervention and never checks response.",expertReasoningMove:"Evaluate the same cue cluster that justified the action, then decide if the outcome is improving.",reasoningLadder:["Name the expected response","Recheck the relevant cue","Compare to baseline and goal","Decide improve, unchanged, or worse","Escalate or revise if needed"],examples:[je("evaluate-outcomes-1","After Hypoglycemia Treatment","Evaluate rescue response.","A client received IV dextrose for glucose 39 mg/dL and confusion.","Which outcome shows improvement?",["Target cue is glucose and mentation","Recheck glucose per protocol","Look for improved orientation","Plan longer-acting carbohydrate if safe"],"Evaluate glucose response and mental status.","Assume the client is safe without rechecking.","Evaluation confirms whether the rescue corrected the original threat."),je("evaluate-outcomes-2","Oxygen After Positioning","Assess respiratory response.","A heart failure client was placed upright and given oxygen for SpO2 82% with pink frothy sputum.","Which evaluation is most relevant?",["Target was oxygenation","Check SpO2 and work of breathing","Assess lung sounds and mentation","Escalate if no improvement"],"Evaluate oxygenation and distress, not only comfort.","Ask whether the pillow feels better and stop there.","Outcome evaluation must measure the threat the intervention addressed."),je("evaluate-outcomes-3","Fundal Massage Result","Evaluate postpartum bleeding.","After fundal massage, the uterus becomes firm but heavy bleeding continues.","What does evaluation indicate?",["Tone improved","Bleeding persists","Another cause may exist","Escalation and continued assessment are needed"],"Escalate ongoing hemorrhage despite firm fundus.","Stop all action because the uterus is firm.","Evaluation can reveal that one problem improved while another danger remains."),je("evaluate-outcomes-4","Pain Intervention Safety","Evaluate analgesic effect and adverse effect.","Thirty minutes after IV opioid, pain drops from 9 to 4 but RR falls to 9/min and sedation increases.","What is the safest evaluation?",["Pain improved","Ventilation worsened","Outcome is not fully safe","Hold further opioid and intervene per protocol"],"Evaluate both desired and dangerous effects.","Document success because the pain number improved.","A good outcome cannot create a new safety threat."),je("evaluate-outcomes-5","Antibiotic Response","Evaluate sepsis trend.","After fluids and antibiotics, BP rises to 104/64, HR decreases to 98, urine output improves, and mentation clears.","What does this show?",["Perfusion cues are improving","Organ output improved","Mental status improved","Continue monitoring for sustained response"],"Interpret as improving response while continuing surveillance.","Stop monitoring because one set of vitals improved.","Evaluation recognizes improvement but keeps trend-based vigilance.")]}],Ui={stages:In.length,examples:In.reduce((n,a)=>n+a.examples.length,0)},Yn=[{id:"14-day-rescue",name:"14-Day Rescue",days:14,purpose:"Stabilize unsafe readiness quickly without panic stacking.",focus:["priority","safety","high-yield NGN","fatigue control"],bestFor:"Learners close to the exam with unstable priority or NGN performance."},{id:"30-day-balanced",name:"30-Day Balanced",days:30,purpose:"Build steady structured growth with enough repetiti t stacking causes burnout and makes the next day unsafe."},{trigger:"High confidence gap",plannerResponse:"Add confidence marking, high-confidence miss review, and smaller timed blocks.",rationale:"Calibration prevents rushing easy-looking questions and panic after misses."}],b2=[{id:"study-endurance",title:"Study Endurance",questions:["I can maintain reasoning quality after 45 minutes.","I know when my accuracy starts to drop.","I stop before fatigue turns review unsafe."]},{id:"schedule-realism",title:"Schedule Realism",questions:["My plan fits work and family load.","I do not build fantasy study days.","I leave recovery time after hard sets."]},{id:"review-quality",title:"Review Quality",questions:["I classify misses by reasoning pattern.","I review why wrong options were tempting.","I redo missed items after spacing."]},{id:"anxiety-stability",title:"Anxiety Stability",questions:["A bad score does not ruin the next block.","I use reset breaks instead of panic-review.","I do not over-study to punish myself."]},{id:"ngn-readiness-scan",title:"NGN Readiness",questions:["I practice NGN even when it is uncomfortable.","I can explain the CJMM stage behind misses.","I can finish a case without rushing the final tabs."]}],v2=["ABC/Safety","Acuity/Stability","Delegation","Infection","Medication","Psych/Ethics","NGN/CJMM"],x2=[{id:"abc",name:"ABC",category:["ABC/Safety"],whenItHelps:"Use ABC when airway, breathing, or circulation are actively threatened and action can prevent rapid collapse.",whenItMisleads:"It misleads when learners chase airway words while the airway is protected and a different patient is unstable.",redFlagCues:["stridor","RR under 10","SpO2 falling despite oxygen","hypotension","uncontrolled bleeding"],wrongUseWarning:"Do not use ABC as a keyword rule; compare actual instability.",strongUsePattern:"Confirm the threat, intervene within scope, and reassess the same vital cue.",miniCases:[{title:"Stridor After Food Allergy",clinicalTask:"Prioritize airway action.",stem:"A client develops lip swelling, hoarse voice, and inspiratory stridor after receiving a new antibiotic.",priorityQuestion:"Which action is priority?",choices:["Ask about diet history","Stop exposure and initiate anaphylaxis response","Teach allergy bracelet use","Offer water"],correctAnswer:"Stop exposure and initiate anaphylaxis response",whyThisLensWorks:"Airway edema and stridor are active airway threats.",whenThisLensWouldFail:"It would fail if another client only had a chronic low oxygen value while someone else was in shock.",saferReasoningMove:"Use ABC when the airway is actually narrowing now."},{title:"Opioid Ventilation Drop",clinicalTask:"Rank immediate risk.",stem:"A client after IV opioid is hard to arouse, RR 6/min, and SpO2 86%.",priorityQuestion:"Which model best guides priority?",choices:["ABC","Maslow only","Least restrictive","Chronic stability"],correctAnswer:"ABC",whyThisLensWorks:"Ventilation failure is a breathing emergency.",whenThisLensWouldFail:"ABC would mislead if used to ignore medication cause and needed antidote protocol.",saferReasoningMove:"Support breathing and remove the medication threat."},{title:"GI Bleed Perfusion",clinicalTask:"Apply circulation priority.",stem:"A client with hematemesis has BP 82/46, HR 136, cool skin, and delayed capillary refill.",priorityQuestion:"Which lens should drive action?",choices:["ABC circulation","Teaching","Pain comfort","Routine discharge"],correctAnswer:"ABC circulation",whyThisLensWorks:"Circulation is actively failing.",whenThisLensWouldFail:"It would fail if bleeding was old and stable while another client had new neuro deficits.",saferReasoningMove:"Prioritize perfusion collapse over less urgent needs."},{title:"Tension Clues",clinicalTask:"Recognize respiratory-circulatory collapse.",stem:"After chest trauma, a client has severe dyspnea, absent left breath sounds, tracheal shift, and hypotension.",priorityQuestion:"Which model fits?",choices:["ABC","Expected vs unexpected only","Delegation","Review quality"],correctAnswer:"ABC",whyThisLensWorks:"Breathing and circulation are both threatened.",whenThisLensWouldFail:"It fails if the learner keeps reassessing without activating emergency help.",saferReasoningMove:"Escalate immediately while supporting oxygenation."},{title:"Airway Protected COPD",clinicalTask:"Avoid ABC misuse.",stem:"A COPD client has baseline SpO2 90% and talks normally; another has new BP 78/40 after surgery.",priorityQuestion:"How should ABC be used?",choices:["See COPD first because oxygen is mentioned","See the post-op client with shock cues","Ignore both","Teach pursed-lip breathing only"],correctAnswer:"See the post-op client with shock cues",whyThisLensWorks:"Circulation instability outranks a protected chronic respiratory baseline.",whenThisLensWouldFail:"It fails when learners treat all airway words as first.",saferReasoningMove:"Compare actual airway failure to circulation collapse."}]},{id:"maslow",name:"Maslow",category:["ABC/Safety","Psych/Ethics"],whenItHelps:"Use Maslow after confirming no immediate safety threat, especially when needs compete across nutrition, comfort, rest, and psychosocial stability.",whenItMisleads:"It misleads when learners choose comfort or food before imminent self-harm, hypoglycemia, or bleeding.",redFlagCues:["suicide plan","symptomatic hypoglycemia","active hemorrhage","violent escalation","airway distress"],wrongUseWarning:"Maslow does not outrank active safety threats.",strongUsePattern:"Stabilize danger first, then organize remaining needs by physiologic and safety priority.",miniCases:[{title:"Food Need or Safety Need",clinicalTask:"Choose priority need.",stem:"A diabetic client says they are hungry, sweating, and confused. Glucose is 44 mg/dL.",priorityQuestion:"Which need is priority?",choices:["Routine meal preference","Rapid treatment of hypoglycemia","Long-term exercise plan","Sleep hygiene"],correctAnswer:"Rapid treatment of hypoglycemia",whyThisLensWorks:"A physiologic threat is present and time sensitive.",whenThisLensWouldFail:"It fails if hunger is treated as routine nutrition instead of hypoglycemia.",saferReasoningMove:"Identify the unsafe unmet need, not the pleasant one."},{title:"Belonging Versus Violence",clinicalTask:"Prioritize psych safety.",stem:"A manic client wants group activity but is shouting, threatening peers, and clenching fists.",priorityQuestion:"What should guide priority?",choices:["Belonging need","Immediate safety need","Self-esteem need","Routine teaching"],correctAnswer:"Immediate safety need",whyThisLensWorks:"Safety is more basic than group participation right now.",whenThisLensWouldFail:"It fails if social needs are pursued while violence risk rises.",saferReasoningMove:"Create a safe environment before therapeutic socialization."},{title:"Pain and Bleeding",clinicalTask:"Apply Maslow with context.",stem:"A postpartum client reports cramping pain but also saturates a pad in 10 minutes and feels faint.",priorityQuestion:"Which need is first?",choices:["Comfort","Circulation safety","Teaching","Sleep"],correctAnswer:"Circulation safety",whyThisLensWorks:"Physiologic survival outranks comfort.",whenThisLensWouldFail:"It fails when all discomfort is treated as the priority need.",saferReasoningMove:"Use bleeding pattern to rank needs."},{title:"Cold Client With Stridor",clinicalTask:"Avoid comfort-first reasoning.",stem:"A client asks for a blanket while developing stridor and facial swelling after a medication.",priorityQuestion:"Which need is priority?",choices:["Warmth","Airway safety","Self-esteem","Nutrition"],correctAnswer:"Airway safety",whyThisLensWorks:"Maslow supports physiologic survival first.",whenThisLensWouldFail:"It fails if the comfort request captures attention.",saferReasoningMove:"Respond to the life threat before comfort."},{title:"After Safety Is Restored",clinicalTask:"Use Maslow appropriately.",stem:"A stable post-op client has controlled vitals, pain 2/10, and has not eaten g","Delay until clinic visit"],correctAnswer:"Treat new neurologic symptoms as acute",whyThisLensWorks:"The new neurologic loss changes priority.",whenThisLensWouldFail:"It fails if chronic labels hide acute deterioration.",saferReasoningMove:"Search for what changed inside chronic problems."},{title:"Stable COPD Versus Acute Stroke",clinicalTask:"Prioritize by onset.",stem:"One client has stable COPD cough. Another suddenly develops facial droop.",priorityQuestion:"Which lens supports priority?",choices:["Acute > Chronic","Pain first","Teaching first","Least restrictive"],correctAnswer:"Acute > Chronic",whyThisLensWorks:"The stroke signs are new and time sensitive.",whenThisLensWouldFail:"It fails if COPD becomes an acute exacerbation with distress.",saferReasoningMove:"Prioritize new focal deficits."},{title:"Chronic AF, New Bleeding",clinicalTask:"Identify acute danger.",stem:"A client has controlled chronic atrial fibrillation. Another on warfarin has melena and dizziness.",priorityQuestion:"Which issue is acute?",choices:["Controlled AF","Melena with dizziness","Routine diet question","Chronic dry skin"],correctAnswer:"Melena with dizziness",whyThisLensWorks:"Active bleeding is acute and unsafe.",whenThisLensWouldFail:"It fails if controlled chronic diagnoses are overvalued.",saferReasoningMove:"Prioritize the new harm pattern."},{title:"Long-Term Diabetes, New DKA",clinicalTask:"Recognize chronic disease decompensation.",stem:"A client with diabetes has glucose 422, vomiting, fruity breath, and deep rapid respirations.",priorityQuestion:"Which interpretation is safest?",choices:["Routine chronic diabetes","Acute DKA risk","Only dietary nonadherence","Normal exercise response"],correctAnswer:"Acute DKA risk",whyThisLensWorks:"A chronic disease has become acutely unstable.",whenThisLensWouldFail:"It fails if chronic labels are dismissed automatically.",saferReasoningMove:"Ask whether the chronic condition is stable or crashing."}]},{id:"unstable-stable",name:"Un
