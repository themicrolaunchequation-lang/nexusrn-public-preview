    }
    function navigate(route, replace){
      route = route || 'home';
      var hash = route === 'home' ? '' : '#' + route;
      if(replace) history.replaceState(null, '', location.pathname + location.search + hash);
      else if(location.hash !== hash) location.hash = hash;
      applyRoute();
    }
    function applyRoute(){
      var route = routeFromHash();
      setActive(route);
      var src = PATHS[route];
      var current = frame.getAttribute('src') || '';

        showBoot(route === 'home' ? 'Loading landing page…' : route === 'practice' ? 'Loading Practice Dashboard…' : route === 'public-demo' ? 'Loading Public Demo…' : 'Loading Decision Lab…');

        if(route === 'practice') {

        hideBootSoon();

    function installLandingBridge(){
      if(routeFromHash() !== 'home') return;
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;

          var route = null;
          if(href === '#public-demo' || href === '#demo' || txt.indexOf('public demo') !== -1 || txt.indexOf('try demo') !== -1) route = 'public-demo';
          if(href === '#practice' || href === '#dashboard' || txt.indexOf('start practicing') !== -1 || txt.indexOf('start practice') !== -1 || txt.indexOf('practice dashboard') !== -1) route = 'practice';
          if(href === '#decision-lab' || href === '#decisionlab' || txt.indexOf('explore decision lab') !== -1 || txt === 'decision lab' || (txt.indexOf('decision lab') !== -1 && txt.indexOf('clinical judgment') === -1)) route = 'decision-lab';
          if(route){
            ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
            navigate(route);
          }
        }, true);
      } catch(e) {}
    }
    var nexusV217RouteTimer=null;
    function nexusV217StartRouteTimer(label){
      try{clearTimeout(nexusV217RouteTimer);}catch(e){}

          error.style.display='block';
        }
      },12000);
    }
    frame.addEventListener('load', function(){
      try{clearTimeout(nexusV217RouteTimer);}catch(e){}
      loaded[routeFromHash()] = true;
      hideBootSoon();
      installLandingBridge();
    });
    frame.addEventListener('error', function(){
      error.innerHTML = 'Could not load route <code>' + routeFromHash() + '</code>. Check that <code>' + (PATHS[routeFromHash()] || '') + '</code> exists.';
      error.style.display = 'block';
      hideBootSoon();
    });
    if(nav) nav.addEventListener('click', function(ev){
      var btn = ev.target.closest && ev.target.closest('button[data-route]');
      if(!btn) return;
      navigate(btn.getAttribute('data-route'));
    });

      var data = ev && ev.data;
      if(!data || typeof data !== 'object') return;
      if(data.source === 'NexusRNLanding' && data.event === 'landing-ready') hideBootSoon();
